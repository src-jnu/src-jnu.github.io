---
layout: default
title: SRC Lab.
---
<div class="photo">
      <div class="container">
          <h1 class="photo">Photo</h1>
            {% for pub in site.data.photo %}
            <article class="photo-card">
                  <div class="photo-card-header">
                    <h3 class="photo-title"><b>{{ pub.title }}</b></h3>
                    <p class="photo-date">{{ pub.date }}</p>
                  </div>

                  <div class="photo-grid">
                    {% for i in (1..8) %}
                      {% assign key = 'photo' | append: i %}
                      {% assign filename = pub[key] %}
                      {% if filename %}
                        <div class="photo-item">
                          <a class="photo-lightbox-trigger" href="/image/photo/{{ filename }}" data-title="{{ pub.title | escape }}" data-date="{{ pub.date | escape }}">
                            <img class="photo-thumb" src="/image/photo/{{ filename }}" loading="lazy" decoding="async" alt="{{ pub.title | escape }} {{ i }}">
                          </a>
                        </div>
                      {% endif %}
                    {% endfor %}
                  </div>
            </article>
            {% endfor %}
      </div>
</div>

<div class="photo-lightbox" id="photo-lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Photo preview">
      <div class="photo-lightbox-frame">
            <button class="photo-lightbox-close" type="button" aria-label="Close photo preview">&times;</button>
            <div class="photo-lightbox-panel">
                  <div class="photo-lightbox-image-wrap">
                        <img class="photo-lightbox-image" src="" alt="">
                  </div>
                  <div class="photo-lightbox-caption">
                        <h3 class="photo-lightbox-title"></h3>
                        <p class="photo-lightbox-date"></p>
                        <a class="photo-lightbox-original" href="" target="_blank" rel="noopener">Open original</a>
                  </div>
            </div>
      </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
      var lightbox = document.getElementById('photo-lightbox');
      if (!lightbox) return;

      var image = lightbox.querySelector('.photo-lightbox-image');
      var title = lightbox.querySelector('.photo-lightbox-title');
      var date = lightbox.querySelector('.photo-lightbox-date');
      var originalLink = lightbox.querySelector('.photo-lightbox-original');
      var closeButton = lightbox.querySelector('.photo-lightbox-close');
      var lastActiveElement = null;

      function openLightbox(trigger) {
            lastActiveElement = trigger;
            image.src = trigger.href;
            image.alt = trigger.querySelector('img').alt;
            originalLink.href = trigger.href;
            title.textContent = trigger.dataset.title || '';
            date.textContent = trigger.dataset.date || '';
            lightbox.classList.add('is-open');
            lightbox.setAttribute('aria-hidden', 'false');
            document.body.classList.add('photo-lightbox-open');
            closeButton.focus();
      }

      function closeLightbox() {
            lightbox.classList.remove('is-open');
            lightbox.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('photo-lightbox-open');
            image.src = '';
            originalLink.href = '';
            if (lastActiveElement) {
                  lastActiveElement.focus();
            }
      }

      document.querySelectorAll('.photo-lightbox-trigger').forEach(function (trigger) {
            trigger.addEventListener('click', function (event) {
                  event.preventDefault();
                  openLightbox(trigger);
            });
      });

      closeButton.addEventListener('click', closeLightbox);

      image.addEventListener('click', closeLightbox);

      lightbox.addEventListener('click', function (event) {
            if (event.target === lightbox) {
                  closeLightbox();
            }
      });

      document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
                  closeLightbox();
            }
      });
});
</script>
