<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="/image/src/logo_favicon.ico">
    <title>{{ site.title }}</title>

    {% if page.excerpt or site.github.project_tagline %}
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.github.project_tagline }}{% endif %}">
    {% endif %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="/pages/main.css?v={{ site.time | date: '%s' }}" />

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #222;
        }

        .navbar-default {
            background-color: #ffffff;
            border-color: #e5e8ef;
            min-height: 62px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .navbar-default .navbar-brand {
            color: #222;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .navbar-default .navbar-brand:hover,
        .navbar-default .navbar-nav>li>a:hover {
            color: #111;
        }

        .navbar-default .navbar-nav>li>a {
            color: #4a5568;
            padding: 20px 12px;
        }

        .navbar-default .navbar-toggle {
            border-color: rgba(74, 85, 104, 0.2);
        }

        .navbar-default .icon-bar {
            background-color: #4a5568;
        }

        .site-footer {
            background-color: #ffffff;
            color: #4a5568;
            border-top: 1px solid #e5e8ef;
            padding: 30px 0;
        }

        .site-footer a {
            color: #4a5568;
            text-decoration: none;
        }

        .site-footer a:hover {
            color: #111;
            text-decoration: underline;
        }

        .site-footer .footer-links {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
        }

        .site-footer .footer-links li {
            display: inline-block;
            margin-right: 0.75rem;
            font-size: 1.05rem;
        }

        .site-footer .footer-links li:last-child {
            margin-right: 0;
        }

        .site-footer .footer-links li a {
            font-size: 1.05rem;
            font-weight: 500;
        }

        .site-footer .footer-note {
            color: #8a96a6;
            margin-top: 18px;
            font-size: 0.95rem;
        }
    </style>

    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.github.url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.github.project_title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.github.url }}">
</head>
